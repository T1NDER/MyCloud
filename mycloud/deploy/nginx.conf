server {
    listen 80;
    server_name 89.108.76.150;

    client_max_body_size 100M;
    client_body_buffer_size 128k;

    access_log /var/log/nginx/mycloud_access.log;
    error_log /var/log/nginx/mycloud_error.log;

    location /static/ {
        alias /home/dmitrii/MyCloud/mycloud/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/dmitrii/MyCloud/mycloud/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /home/dmitrii/MyCloud/mycloud/backend/staticfiles/;
        try_files /$uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(api|admin) {
        proxy_pass http://unix:/home/dmitrii/MyCloud/mycloud/backend/mycloud.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://unix:/home/dmitrii/MyCloud/mycloud/backend/mycloud.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ /\. {
        deny all;
    }

    location ~* ^.+.(git|svn|DS_Store)$ {
        deny all;
    }
}